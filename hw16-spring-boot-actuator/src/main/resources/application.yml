management:
  endpoints:
    web:
      exposure:
#        include: "*"
        include: health,metrics,logfile,mappings
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true
logging:
  file:
    name: ./app.log
spring:
  data:
    rest:
      base-path: /api/auto
  shell:
    interactive:
      enabled: false
    noninteractive:
      enabled: true
  datasource:
    url: jdbc:h2:mem:maindb
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      schema-locations: classpath:schema.sql
  h2:
    console:
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
#    generate-ddl: true
    hibernate:
#      ddl-auto: create
      ddl-auto: none

    properties:
      hibernate:
        format_sql: true

    show-sql: true
server:
  port: 8081

